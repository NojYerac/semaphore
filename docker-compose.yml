version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: semaphore-db
    environment:
      POSTGRES_DB: ${SEMAPHORE_DB_NAME:-semaphore}
      POSTGRES_USER: ${SEMAPHORE_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${SEMAPHORE_DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SEMAPHORE_DB_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - semaphore-network

  semaphore:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: semaphore-service
    environment:
      # Application name
      SEMAPHORE_NAME: ${SEMAPHORE_NAME:-semaphore}
      
      # Database configuration
      SEMAPHORE_DATABASE_CONNECTION_STRING: ${SEMAPHORE_DATABASE_CONNECTION_STRING:-postgres://postgres:postgres@postgres:5432/semaphore?sslmode=disable}
      
      # Authentication configuration
      SEMAPHORE_AUTH_ISSUER: ${SEMAPHORE_AUTH_ISSUER:-semaphore}
      SEMAPHORE_AUTH_AUDIENCE: ${SEMAPHORE_AUTH_AUDIENCE:-semaphore-api}
      SEMAPHORE_AUTH_HMAC_SECRET: ${SEMAPHORE_AUTH_HMAC_SECRET:-change-me}
      SEMAPHORE_AUTH_CLOCK_SKEW: ${SEMAPHORE_AUTH_CLOCK_SKEW:-60s}
      
      # Logging configuration
      SEMAPHORE_LOG_LEVEL: ${SEMAPHORE_LOG_LEVEL:-info}
      SEMAPHORE_HUMAN_FRIENDLY: ${SEMAPHORE_HUMAN_FRIENDLY_LOG:-false}
      
      # HTTP server configuration
      SEMAPHORE_PORT: ${SEMAPHORE_HTTP_PORT:-8080}
      
      # Tracing configuration (optional)
      SEMAPHORE_EXPORTER_TYPE: ${SEMAPHORE_EXPORTER_TYPE:-noop}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - semaphore-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  semaphore-network:
    driver: bridge
