---
log_config_on_init: True
human_friendly: True
log_level: debug
exporter_type: "noop"

auth_issuer: "semaphore"
auth_audience: "semaphore-api"
auth_hmac_secret: "change-me"
auth_clock_skew: "30s"

no_tls: True
port: 8080

database_connection_string: "postgres://localhost:5432/postgres?sslmode=disable"

audit_logger_type: "stdout"

