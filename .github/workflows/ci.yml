name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.1"
          cache: true

      - name: Install ginkgo CLI
        run: go install github.com/onsi/ginkgo/v2/ginkgo@latest
        # Ensure $GOBIN is in $PATH for the next steps
        # This is handled automatically by actions/setup-go in recent versions

      - name: Download Go modules
        run: go mod tidy

      - name: Run Ginkgo tests
        run: ginkgo -r --randomize-all --randomize-suites --race --trace -cover

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  docker:
    name: docker-build
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: aeneas:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
